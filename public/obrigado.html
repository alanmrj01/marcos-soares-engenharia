<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#f6f3ed" />
  <title>Solicitação recebida</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;color:#171b1a;background:radial-gradient(circle at 10% 90%,#ffe3d8,transparent 34%),radial-gradient(circle at 90% 10%,#dce5ff,transparent 34%),#f6f3ed;font-family:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.card{max-width:650px;padding:48px;border:1px solid #d8d2c8;border-radius:32px;background:#fff;box-shadow:0 32px 90px #29322e24}.badge{display:inline-block;padding:9px 13px;border-radius:999px;color:#256b5d;background:#ddf4ee;font-weight:800;font-size:13px}h1{font-size:clamp(38px,7vw,64px);line-height:1;margin:24px 0 18px;letter-spacing:-.05em}p{color:#59625f;font-size:18px;line-height:1.7}a{display:inline-flex;margin-top:20px;padding:15px 20px;border-radius:15px;color:#fff;background:linear-gradient(135deg,#2d61e6,#168e79);text-decoration:none;font-weight:800;box-shadow:0 16px 36px #2d61e640}@media(prefers-color-scheme:dark){body{color:#f3f6f2;background:radial-gradient(circle at 10% 90%,#43251c,transparent 34%),radial-gradient(circle at 90% 10%,#202e57,transparent 34%),#101312}.card{border-color:#303734;background:#181d1c;box-shadow:0 32px 90px #0008}.badge{color:#70d5be;background:#173a33}p{color:#b1bbb6}}
  </style>
</head>
<body><main class="card"><span class="badge">Mensagem enviada</span><h1>Solicitação recebida.</h1><p>As informações foram registradas. O próximo contato será direcionado ao entendimento técnico da necessidade apresentada.</p><a href="/">Voltar para a página</a></main></body>
</html>
