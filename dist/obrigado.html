    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at 70% 10%,#133e58,transparent 36%),#071523;color:#fff;font-family:Inter,system-ui,sans-serif}.card{max-width:620px;padding:44px;border:1px solid #2f6078;border-radius:28px;background:#0b2030;box-shadow:0 28px 80px #0008}.badge{display:inline-block;padding:8px 12px;border-radius:999px;background:#143b50;color:#84eaff;font-weight:700}h1{font-size:clamp(36px,7vw,60px);line-height:1;margin:22px 0 16px}p{color:#b9d1dc;font-size:18px;line-height:1.7}a{display:inline-block;margin-top:18px;padding:14px 20px;border-radius:13px;background:#65dcff;color:#06131e;text-decoration:none;font-weight:800}
  </style>
</head>
<body><main class="card"><span class="badge">Mensagem enviada</span><h1>Solicitação recebida.</h1><p>As informações foram registradas. O próximo contato será direcionado ao entendimento técnico da necessidade apresentada.</p><a href="/">Voltar para a página</a></main></body>
